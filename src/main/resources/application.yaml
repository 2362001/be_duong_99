server:
  port: 7000

spring:
  application:
    name: platform-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    driver-class-name: oracle.jdbc.OracleDriver
    username: demo
    password: demo123
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: platform-service-super-secret-key-must-be-at-least-256-bits-long!
  access-token-exp: 3600000
  refresh-token-exp: 7200000